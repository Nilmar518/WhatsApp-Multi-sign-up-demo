name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter @migo-uit/backend build

      - name: Build frontend
        env:
          VITE_FB_APP_ID: ${{ secrets.VITE_FB_APP_ID }}
          VITE_META_CONFIG_ID: ${{ secrets.VITE_META_CONFIG_ID }}
          VITE_BUSINESS_ID: ${{ secrets.VITE_BUSINESS_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_CHANNEX_IFRAME_BASE_URL: ${{ secrets.VITE_CHANNEX_IFRAME_BASE_URL }}
        run: pnpm --filter @migo-uit/frontend build
